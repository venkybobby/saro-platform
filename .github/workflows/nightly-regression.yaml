# FR-TEST-01..03: Automated 100-flow nightly regression
# Runs 100 end-to-end flows against deployed backend
# Fails build if: <70% mitigation rate, >30s avg latency, or >5% error rate
name: SARO Nightly Regression — 100 Flows

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 09:00 PM CST
  workflow_dispatch:        # Allow manual trigger

env:
  BACKEND_URL: https://underground-hildagard-saro-94ba3130.koyeb.app
  MITIGATION_THRESHOLD: 70        # Fail if avg mitigation < 70%
  LATENCY_THRESHOLD_MS: 30000     # Fail if avg latency > 30s
  ERROR_RATE_THRESHOLD: 5         # Fail if error rate > 5%
  TOTAL_FLOWS: 100

jobs:
  regression:
    name: Run 100 E2E Flows
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run 100-flow regression
        id: regression
        run: |
          python .github/scripts/regression_100flows.py \
            --url "${{ env.BACKEND_URL }}" \
            --flows ${{ env.TOTAL_FLOWS }} \
            --mitigation-threshold ${{ env.MITIGATION_THRESHOLD }} \
            --latency-threshold ${{ env.LATENCY_THRESHOLD_MS }} \
            --error-threshold ${{ env.ERROR_RATE_THRESHOLD }}

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ github.run_id }}
          path: regression_report.json

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Nightly regression FAILED. Check regression_report.json artifact for details."
          echo "Threshold violations may include: mitigation <70%, latency >30s, or error rate >5%"
